<!DOCTYPE html>
<html>
<head>
<title>Lavender Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#E6E6FA,#D8BFD8);
    overflow-x:hidden;
}

.section{
    height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:absolute;
    transition:1s;
    background:linear-gradient(135deg,#E6E6FA,#FFFFFF);
}

.hidden{
    opacity:0;
    pointer-events:none;
}

h1,h2,p{
    color:#6A0DAD;
    text-shadow:0 0 15px rgba(186,85,211,0.8);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:#D8BFD8;
    color:#6A0DAD;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #BA55D3;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,120px);
    gap:10px;
}

.gallery img{
    width:120px;
    height:120px;
    border-radius:15px;
    object-fit:cover;
    box-shadow:0 0 15px #BA55D3;
}

.typing{
    width:70%;
    font-size:20px;
    text-align:center;
    min-height:120px;
}

video{
    width:320px;
    border-radius:20px;
    box-shadow:0 0 20px #BA55D3;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f3e8ff, #ffffff);
  overflow-x: hidden;
  text-align: center;
}

.section{
    min-height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:absolute;
    transition:1s;
    background:linear-gradient(135deg,#E6E6FA,#FFFFFF);
    padding:20px;
}
h1 {
  font-size: 2rem;
  color: #7e22ce;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: #c084fc;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #a855f7;
  transform: scale(1.05);
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 900px;
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 0 15px #BA55D3;
}
video {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  border-radius: 0;
}
#letter {
  font-size: 1.1rem;
  max-width: 600px;
  color: #6b21a8;
  line-height: 1.6;
}
@media (max-width: 768px) {
  video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    border-radius: 0;
  }

  .gallery img {
    height: 220px;
  }
}
</style>

</head>

<body>

<!-- Sheet 1 -->
<div class="section" id="s1">
    <h1>Happy Birthday 💜</h1>
    <button onclick="startExperience()">Open Surprise</button>
</div>

<!-- Sheet 2 -->
<div class="section hidden" id="s2">
    <h2>Beautiful Memories ✨</h2>
    <div class="gallery">
        <img src="1.jpeg">
        <img src="2.jpeg">
        <img src="3.jpeg">
        <img src="4.jpeg">
        <img src="5.jpeg">
    </div>
    <p>Every moment with you is magical 💫</p>
    <button onclick="next(2)">Next</button>
</div>

<!-- Sheet 3 -->
<div class="section hidden" id="s3">
    <h2>A Letter For You 💌</h2>
    <div class="typing" id="letter"></div>
    <button onclick="next(3)">Next</button>
</div>

<!-- Sheet 4 -->
<div class="section hidden" id="s4">
    <h2>Our Special Video 🎥</h2>
    
    <video id="bdayVideo" controls>
        <source src="birthday.mp4" type="video/mp4">
    </video>

    <p id="finalMessage" 
       style="font-size:22px; font-weight:bold; margin-top:20px; display:none;">
        Thank you for being in my life 💜✨
    </p>
    <button onclick="exitPage()">Exit</button>
</div>
<audio id="bgMusic" loop>
  <source src="./music.mp3" type="audio/mp3">
</audio>
<script>
    function next(current){
    document.getElementById("s"+current).classList.add("hidden");
    document.getElementById("s"+(current+1)).classList.remove("hidden");
}
function exitPage(){
    window.location.href = "about:blank";
}

/* Page switching */
function startExperience(){
    const music = document.getElementById("bgMusic");

    music.volume = 0.4;

    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("Autoplay blocked:", error);
        });
    }
  type(); 
    next(1);
}
/* Auto typing effect */
const text = `You are my happiness.
You are my strength.
You make my world brighter.
Every day with you is special.
I’m grateful for you always. 💜`;

let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("letter").innerHTML += text.charAt(i);
        i++;
        setTimeout(type,50);
    }
}

type();

/* Wait until page fully loads */
window.onload = function(){

    const video = document.getElementById("bdayVideo");
    const finalMessage = document.getElementById("finalMessage");
    const music = document.getElementById("bgMusic");

    // Pause music when video starts
    video.onplay = function(){
        music.pause();
    };

    // Show thank you after video ends
    video.onended = function(){
        finalMessage.style.display = "block";

        setTimeout(function(){
            if(confirm("The End 💜\n\nClick OK to Exit")){
                window.location.href = "about:blank";
            }
        },3000);
    };
};

</script>

</body>
</html>
